<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ story.title }} | {{ stylist.name }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <header class="story-hero">
    <div class="story-hero-inner">
      <p class="hero-label">{{ story.kicker }} · {{ story.issue }}</p>
      <h1>{{ story.title }}</h1>
      <p class="hero-copy">{{ story.description }}</p>
      <a class="back-link" href="{{ url_for('home') }}">← Back to portfolio</a>
    </div>
  </header>

  <main class="page-wrap story-page">
    <section class="stylist-block">
      <p class="stylist-label">Stylist</p>
      <h2>{{ stylist.name }}</h2>
      <p class="stylist-bio">{{ stylist.bio }}</p>
    </section>

    <section class="gallery-grid">
      {% for image in story.images %}
      <figure class="gallery-item">
        <a
          class="gallery-link"
          href="#"
          data-image="{{ url_for('static', filename='images/' + story.folder + '/' + image) }}"
          data-index="{{ loop.index0 }}"
        >
          <img
            src="{{ url_for('static', filename='images/' + story.folder + '/' + image) }}"
            alt="{{ story.title }} image {{ loop.index }}"
          >
        </a>
      </figure>
      {% endfor %}
    </section>

    <div class="lightbox" id="lightbox" aria-hidden="true">
      <button class="lightbox-close" id="lightbox-close" aria-label="Close">×</button>
      <button class="lightbox-arrow lightbox-prev" id="lightbox-prev" aria-label="Previous image">‹</button>
      <img class="lightbox-image" id="lightbox-image" alt="">
      <button class="lightbox-arrow lightbox-next" id="lightbox-next" aria-label="Next image">›</button>
    </div>

    <script>
      const galleryLinks = Array.from(document.querySelectorAll(".gallery-link"));
      const lightbox = document.getElementById("lightbox");
      const lightboxImage = document.getElementById("lightbox-image");
      const lightboxClose = document.getElementById("lightbox-close");
      const lightboxPrev = document.getElementById("lightbox-prev");
      const lightboxNext = document.getElementById("lightbox-next");

      const images = galleryLinks.map(link => link.dataset.image);
      let currentIndex = 0;

      function openLightbox(index) {
        currentIndex = index;
        lightboxImage.src = images[currentIndex];
        lightbox.classList.add("is-open");
        lightbox.setAttribute("aria-hidden", "false");
      }

      function closeLightbox() {
        lightbox.classList.remove("is-open");
        lightbox.setAttribute("aria-hidden", "true");
        lightboxImage.src = "";
      }

      function showNext() {
        currentIndex = (currentIndex + 1) % images.length;
        lightboxImage.src = images[currentIndex];
      }

      function showPrev() {
        currentIndex = (currentIndex - 1 + images.length) % images.length;
        lightboxImage.src = images[currentIndex];
      }

      galleryLinks.forEach((link, index) => {
        link.addEventListener("click", (event) => {
          event.preventDefault();
          openLightbox(index);
        });
      });

      lightboxClose.addEventListener("click", closeLightbox);
      lightboxNext.addEventListener("click", showNext);
      lightboxPrev.addEventListener("click", showPrev);

      lightbox.addEventListener("click", (event) => {
        if (event.target === lightbox) {
          closeLightbox();
        }
      });

      document.addEventListener("keydown", (event) => {
        if (!lightbox.classList.contains("is-open")) return;
        if (event.key === "Escape") closeLightbox();
        if (event.key === "ArrowRight") showNext();
        if (event.key === "ArrowLeft") showPrev();
      });
    </script>
  </main>
</body>
</html>
